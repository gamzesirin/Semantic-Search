# Frontend container'ı içindeki nginx — sadece statik React dosyalarını sunar.
# /api yönlendirmesi YOK; onu Dokploy (Traefik) backend uygulamasına yönlendiriyor.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # React SPA — bilinmeyen yolları index.html'e düşür
    location / {
        try_files $uri $uri/ /index.html;
    }
}
