# nginx site config — tek domainde hem React (statik) hem backend (/api proxy).
# Sunucuda /etc/nginx/sites-available/semanticsearch olarak kopyalanır,
# sonra sites-enabled'a symlink verilir.
#
# Bu dosya SADECE 80 portu (HTTP) içindir. HTTPS sertifikasını certbot
# otomatik ekler (aşağıdaki adımlara bak) ve bu dosyayı kendisi günceller.

server {
    listen 80;
    server_name semanticsearch.gamzesirin.com.tr;

    # React production build çıktısı (npm run build -> build/ klasörü)
    root /home/gamze/Semantic-Search/frontend/build;
    index index.html;

    # API isteklerini backend'e (uvicorn) yönlendir
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # RAG/LLM cevabı uzun sürebilir
        proxy_read_timeout 120s;
    }

    # React router — bilinmeyen yolları index.html'e düşür (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
